<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1125" role="img" aria-labelledby="title desc">
  <title id="title">Clay sculpting in the goonjaa studio</title>
  <desc id="desc">Warm terracotta clay forms, hand tools, and painted beads arranged on ivory paper.</desc>
  <defs>
